name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: pip install -r requirements-test.txt
      - run: cd frontend && npm ci
      - run: bin/test

  ship:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Build + push image
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # Deploy
      - name: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "DEPLOY_HOST / DEPLOY_KEY not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          DIR="/opt/cc"
          ssh -o StrictHostKeyChecking=no "$DEPLOY_HOST" "sudo mkdir -p $DIR/bin"
          scp -o StrictHostKeyChecking=no docker-compose.yml Caddyfile "$DEPLOY_HOST:/tmp/"
          scp -o StrictHostKeyChecking=no bin/post-consume "$DEPLOY_HOST:/tmp/post-consume"
          ssh -o StrictHostKeyChecking=no "$DEPLOY_HOST" \
            "sudo cp /tmp/docker-compose.yml /tmp/Caddyfile $DIR/ \
            && sudo cp /tmp/post-consume $DIR/bin/ \
            && rm -f /tmp/docker-compose.yml /tmp/Caddyfile /tmp/post-consume \
            && echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin \
            && cd $DIR && sudo docker compose pull app \
            && sudo docker compose up -d --force-recreate --remove-orphans"
