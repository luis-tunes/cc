name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cc
          POSTGRES_USER: cc
          POSTGRES_PASSWORD: cc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cc"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest app/tests/ -v
        env:
          DATABASE_URL: postgresql://cc:cc@localhost:5432/cc

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '.env' \
            . "$DEPLOY_HOST:/opt/cc/"
          ssh "$DEPLOY_HOST" "cd /opt/cc && docker-compose up -d --build"
