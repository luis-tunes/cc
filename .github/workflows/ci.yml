name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest app/tests/ -v
        env:
          DATABASE_URL: postgresql://cc:cc@localhost:5432/cc
          AUTH_DISABLED: '1'

      # Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci && npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "DEPLOY_HOST / DEPLOY_KEY not configured — skipping"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude 'node_modules' \
            --exclude '.env' \
            . "$DEPLOY_HOST:/opt/cc/"
          ssh "$DEPLOY_HOST" "cd /opt/cc && docker compose up -d --build"
