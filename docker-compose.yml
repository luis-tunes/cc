services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cc}
      POSTGRES_USER: ${POSTGRES_USER:-cc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cc}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./bin/init-db:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cc}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.14
    restart: unless-stopped
    environment:
      PAPERLESS_DBENGINE: postgresql
      PAPERLESS_DBHOST: db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: ${POSTGRES_USER:-cc}
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD:-cc}
      PAPERLESS_REDIS: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      PAPERLESS_URL: http://localhost:8000
      PAPERLESS_OCR_LANGUAGE: por+eng
      PAPERLESS_OCR_LANGUAGES: por
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:-changeme}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-admin}
      PAPERLESS_POST_CONSUME_SCRIPT: /opt/bin/post-consume
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - ./bin:/opt/bin:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000')\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    image: ghcr.io/xzero-ai/cc:latest
    restart: unless-stopped
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cc}:${POSTGRES_PASSWORD:-cc}@db:5432/${POSTGRES_DB:-cc}
      PAPERLESS_URL: http://paperless:8000
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PEM_PUBLIC_KEY: ${CLERK_PEM_PUBLIC_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      AUTH_DISABLED: ${AUTH_DISABLED:-0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      APP_URL: ${APP_URL:-https://localhost}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-info@xtim.ai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MASTER_USER_IDS: ${MASTER_USER_IDS:-filipeferreira@evolsign.com,luistunes0@gmail.com}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      WEB_DIR: /opt/tim/web
      UPLOADS_DIR: /opt/tim/uploads
    volumes:
      - uploads:/opt/tim/uploads
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      paperless:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      app:
        condition: service_healthy

volumes:
  pgdata:
  paperless_data:
  paperless_media:
  uploads:
  caddy_data:
  caddy_config:
